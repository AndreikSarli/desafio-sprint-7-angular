<div class="home-container">
  <div class="sidebar-overlay" [class.active]="menuAberto" (click)="toggleMenu()"></div>

  <div class="sidebar" [class.active]="menuAberto">
    <div class="logo-container">
      <img src="/ford.png" alt="Ford Logo" class="sidebar-logo" />
    </div>
    <nav class="nav flex-column mt-3">
      <a class="nav-link active" routerLink="/home" (click)="toggleMenu()">Home</a>
      <a class="nav-link" routerLink="/dashboard">Dashboard</a>
      <button class="btn btn-link nav-link text-start logout-btn" (click)="logout()">Sair</button>
    </nav>
  </div>

  <button class="menu-toggle-btn" (click)="toggleMenu()">
    <span class="hamburger-icon">&#9776;</span>
  </button>

  <div class="content-area">
    <div class="card shadow style-card border-0">
      <div
        class="card-header bg-transparent text-muted small border-bottom d-block text-start w-100 px-3 py-2"
      >
        Sistema de dados FORD
      </div>

      <div class="card-body d-flex flex-grow-1 justify-content-center align-items-center p-0">
        <h4 class="text-primary font-weight-bold m-0">Seja bem vindo(a)!</h4>
      </div>
    </div>
  </div>
</div>
