<div class="home-container">
  <div
    class="sidebar-overlay"
    [class.active]="menuService.menuAberto"
    (click)="menuService.toggleMenu()"
  ></div>

  <div class="sidebar" [class.active]="menuService.menuAberto" [class.animar]="menuService.clicado">
    <div class="logo-container">
      <img src="/ford.png" alt="Ford Logo" class="sidebar-logo" />
    </div>
    <nav class="nav flex-column mt-3">
      <a class="nav-link active" routerLink="/home">Home</a>
      <a class="nav-link" routerLink="/dashboard">Dashboard</a>
    </nav>
  </div>

  <button class="menu-toggle-btn" (click)="menuService.toggleMenu()">
    <span class="hamburger-icon">&#9776;</span>
  </button>

  <div class="user-dropdown-container">
    <button class="user-btn" (click)="toggleDropdown($event)">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="26"
        height="26"
        fill="currentColor"
        class="bi bi-person-circle"
        viewBox="0 0 16 16"
      >
        <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
        <path
          fill-rule="evenodd"
          d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"
        />
      </svg>
    </button>

    <div class="dropdown-menu-ford" [class.show]="mostrarDropdown">
      <div class="dropdown-header-user" *ngIf="usuarioLogado">
        {{ usuarioLogado }}
      </div>
      <button class="dropdown-item-logout" (click)="logout()">🚪 Sair do Sistema</button>
    </div>
  </div>

  <div class="content-area">
    <div class="card shadow style-card border-0">
      <div
        class="card-header bg-transparent text-muted small border-bottom d-block text-start w-100 px-3 py-2 card-header-custom"
      >
        Sistema de dados FORD
      </div>

      <div
        class="card-body card-body-custom d-flex flex-grow-1 justify-content-center align-items-center p-0"
      >
        <h4 class="texto-boas-vindas">Seja bem vindo(a)!</h4>
        <a routerLink="/dashboard" class="btn btn-primary px-4 shadow-sm btn-entrar">
          Acessar Painel de Dados
        </a>
      </div>
    </div>
  </div>
</div>
